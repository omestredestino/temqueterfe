<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc"><title id="title">Animação da runa Isa</title><desc id="desc">Símbolo ᛁ girando lentamente. O movimento é decorativo.</desc><rect width="512" height="512" fill="none"/><g transform-origin="256px 256px"><animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="3s" repeatCount="indefinite"/><text x="256" y="365" text-anchor="middle" font-size="330" font-family="serif" fill="#111">ᛁ</text></g><style>@media (prefers-reduced-motion: reduce){g{animation:none}}</style></svg>